services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: querylens-postgres
    environment:
      POSTGRES_DB: querylens
      POSTGRES_USER: querylens
      POSTGRES_PASSWORD: querylens
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U querylens -d querylens"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:7
    container_name: querylens-mongodb
    command: ["--bind_ip_all"]
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data:
