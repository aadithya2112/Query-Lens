<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .bg { fill: #000; }
    .icon { stroke: #D6C5B3; }
    @media (prefers-color-scheme: light) {
      .bg { fill: #fff; }
      .icon { stroke: #000; }
    }
  </style>
  <rect width="100" height="100" rx="20" class="bg" />
  <circle cx="45" cy="45" r="24" fill="none" class="icon" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="80" y1="80" x2="62" y2="62" class="icon" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>